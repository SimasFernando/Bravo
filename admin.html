<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo — Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <!-- ================= LOGIN ================= -->
  <div class="admin-screen" id="adminLoginScreen">
    <div class="admin-card">
      <div class="admin-logo">BRAVO</div>
      <div class="admin-subtitle">Painel administrativo</div>
      <form id="adminLoginForm">
        <div class="field-group">
          <label class="field-label" for="adminEmail">E-mail</label>
          <input class="field-input" type="email" id="adminEmail" required autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="adminPassword">Senha</label>
          <input class="field-input" type="password" id="adminPassword" required autocomplete="current-password">
        </div>
        <button class="admin-btn" type="submit">ENTRAR</button>
        <div class="admin-status" id="adminLoginStatus"></div>
      </form>
      <button class="admin-btn" id="adminGoogleBtn" style="margin-top:12px;background:var(--surface2);">
        ENTRAR COM GOOGLE
      </button>
    </div>
  </div>

  <!-- ================= ACESSO NEGADO ================= -->
  <div class="admin-screen hidden" id="adminDeniedScreen">
    <div class="admin-card" style="text-align:center;">
      <div class="admin-logo">BRAVO</div>
      <p style="margin:16px 0;color:var(--text);font-size:14px;">
        Essa conta não tem acesso ao painel administrativo.
      </p>
      <button class="admin-btn" id="adminDeniedLogoutBtn">VOLTAR</button>
    </div>
  </div>

  <!-- ================= PAINEL ================= -->
  <div class="admin-screen hidden" id="adminPanelScreen" style="justify-content:flex-start;padding:0;">
    <div class="admin-topbar">
      <div class="admin-logo" style="font-size:18px;margin:0;">BRAVO ADMIN</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-topbar-name" id="adminName"></span>
        <button class="admin-logout" id="adminLogoutBtn">Sair</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-nav">
        <button class="active" data-view="home">Início</button>
        <button data-view="users">Usuários</button>
        <button data-view="groups">Grupos</button>
        <button data-view="programs">Programas Bravo</button>
        <button data-view="messages">Mensagens</button>
        <button data-view="offers">Escolhas Bravo</button>
      </div>

      <div id="adminViewHome">
        <p style="color:var(--muted);font-size:14px;">
          Login e permissão de admin funcionando. Grupos, Programas, Mensagens
          e Ofertas entram nos próximos passos.
        </p>
      </div>

      <div id="adminViewUsers" class="hidden">
        <input class="field-input" id="adminUserSearch" placeholder="Buscar por nome, telefone ou e-mail" style="margin-bottom:16px;">
        <div id="adminUserCount" style="color:var(--muted);font-size:13px;margin-bottom:12px;"></div>
        <div id="adminUserList"></div>
      </div>

      <div id="adminViewGroups" class="hidden">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input class="field-input" id="adminGroupName" placeholder="Nome do novo grupo (ex: Turma manhã)">
          <button class="admin-btn" id="adminGroupAddBtn" style="white-space:nowrap;">CRIAR</button>
        </div>
        <div id="adminGroupList"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/admin-nav.js"></script>
  <script type="module" src="assets/js/admin-auth.js"></script>
  <script type="module" src="assets/js/admin-users.js"></script>
  <script type="module" src="assets/js/admin-groups.js"></script>
</body>
</html>
