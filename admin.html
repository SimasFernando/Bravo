<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo — Admin</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

  <!-- ================= LOGIN ================= -->
  <div class="admin-screen" id="adminLoginScreen">
    <div class="admin-card">
      <div class="admin-logo">BRAVO</div>
      <div class="admin-subtitle">Painel administrativo</div>
      <form id="adminLoginForm">
        <div class="field-group">
          <label class="field-label" for="adminEmail">E-mail</label>
          <input class="field-input" type="email" id="adminEmail" required autocomplete="username">
        </div>
        <div class="field-group">
          <label class="field-label" for="adminPassword">Senha</label>
          <input class="field-input" type="password" id="adminPassword" required autocomplete="current-password">
        </div>
        <button class="admin-btn" type="submit">ENTRAR</button>
        <div class="admin-status" id="adminLoginStatus"></div>
      </form>
      <button class="admin-btn" id="adminGoogleBtn" style="margin-top:12px;background:var(--surface2);">
        ENTRAR COM GOOGLE
      </button>
    </div>
  </div>

  <!-- ================= ACESSO NEGADO ================= -->
  <div class="admin-screen hidden" id="adminDeniedScreen">
    <div class="admin-card" style="text-align:center;">
      <div class="admin-logo">BRAVO</div>
      <p style="margin:16px 0;color:var(--text);font-size:14px;">
        Essa conta não tem acesso ao painel administrativo.
      </p>
      <button class="admin-btn" id="adminDeniedLogoutBtn">VOLTAR</button>
    </div>
  </div>

  <!-- ================= PAINEL ================= -->
  <div class="admin-screen hidden" id="adminPanelScreen" style="justify-content:flex-start;padding:0;">
    <div class="admin-topbar">
      <div class="admin-logo" style="font-size:18px;margin:0;">BRAVO ADMIN</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-topbar-name" id="adminName"></span>
        <button class="admin-logout" id="adminLogoutBtn">Sair</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="admin-nav">
        <button class="active" data-view="home">Início</button>
        <button data-view="users">Usuários</button>
        <button data-view="groups">Grupos</button>
        <button data-view="programs">Programas Bravo</button>
        <button data-view="messages">Mensagens</button>
        <button data-view="offers">Escolhas Bravo</button>
      </div>

      <div id="adminViewHome">
        <p style="color:var(--muted);font-size:14px;">
          Login e permissão de admin funcionando. Grupos, Programas, Mensagens
          e Ofertas entram nos próximos passos.
        </p>
      </div>

      <div id="adminViewUsers" class="hidden">
        <input class="field-input" id="adminUserSearch" placeholder="Buscar por nome, telefone ou e-mail" style="margin-bottom:16px;">
        <div id="adminUserCount" style="color:var(--muted);font-size:13px;margin-bottom:12px;"></div>
        <div id="adminUserList"></div>
      </div>

      <div id="adminViewGroups" class="hidden">
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <input class="field-input" id="adminGroupName" placeholder="Nome do novo grupo (ex: Turma manhã)">
          <button class="admin-btn" id="adminGroupAddBtn" style="white-space:nowrap;">CRIAR</button>
        </div>
        <div id="adminGroupList"></div>
      </div>

      <div id="adminViewPrograms" class="hidden">
        <button class="admin-btn" id="adminProgramNewBtn" style="margin-bottom:16px;">+ NOVO PROGRAMA</button>

        <div id="adminProgramForm" class="hidden" style="background:var(--surface);border:1px solid var(--surface2);border-radius:12px;padding:16px;margin-bottom:20px;">
          <div class="field-group" style="margin-bottom:12px;">
            <label class="field-label">Modo</label>
            <div class="mode-toggle" style="grid-template-columns:1fr 1fr 1fr;">
              <button type="button" class="mode-btn active" data-mode="normal">⏱ Clássico</button>
              <button type="button" class="mode-btn" data-mode="circuit">🔄 Circuito</button>
              <button type="button" class="mode-btn" data-mode="brain">Bravo</button>
            </div>
            <input type="hidden" id="progMode" value="normal">
          </div>
          <div class="field-group" style="margin-bottom:12px;">
            <label class="field-label">Nome do programa</label>
            <input class="field-input" id="progName">
          </div>
          <div class="field-group" style="margin-bottom:12px;">
            <label class="field-label">Observações (dicas, carga, etc.)</label>
            <textarea class="field-input" id="progObs" rows="3" style="resize:vertical;"></textarea>
          </div>

          <div id="progFieldsNormal" class="prog-fields">
            <div class="field-group" style="margin-bottom:12px;">
              <label class="field-label">Nº Exercícios</label>
              <input class="field-input" type="number" id="progNormalExCount" value="1" min="1" max="12">
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
              <div class="field-group"><label class="field-label">Séries</label><input class="field-input" type="number" id="progCycles" value="3"></div>
              <div class="field-group"><label class="field-label">Preparação (s)</label><input class="field-input" type="number" id="progPrep" value="10"></div>
              <div class="field-group"><label class="field-label">Execução (s)</label><input class="field-input" type="number" id="progAction" value="40"></div>
              <div class="field-group"><label class="field-label">Recuperação (s)</label><input class="field-input" type="number" id="progRest" value="20"></div>
            </div>
            <div id="progNormalExList"></div>
          </div>

          <div id="progFieldsCircuit" class="prog-fields hidden">
            <div class="field-group" style="margin-bottom:12px;">
              <label class="field-label">Nº Exercícios</label>
              <input class="field-input" type="number" id="progExCount" value="4" min="1" max="12">
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
              <div class="field-group"><label class="field-label">Rodadas</label><input class="field-input" type="number" id="progRounds" value="3"></div>
              <div class="field-group"><label class="field-label">Preparação (s)</label><input class="field-input" type="number" id="progCPrep" value="10"></div>
              <div class="field-group"><label class="field-label">Execução (s)</label><input class="field-input" type="number" id="progCAction" value="30"></div>
              <div class="field-group"><label class="field-label">Intervalo entre exercícios (s)</label><input class="field-input" type="number" id="progCRest" value="0"></div>
            </div>
            <div id="progCircuitExList"></div>
          </div>

          <div id="progFieldsBrain" class="prog-fields hidden">
            <div class="field-group" style="margin-bottom:12px;">
              <label class="field-label">Nº Exercícios</label>
              <input class="field-input" type="number" id="progBrainExCount" value="2" min="1" max="12">
            </div>
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
              <div class="field-group"><label class="field-label">Séries</label><input class="field-input" type="number" id="progBrainSeries" value="3"></div>
              <div class="field-group"><label class="field-label">Preparação (s)</label><input class="field-input" type="number" id="progBrainPrep" value="15"></div>
              <div class="field-group"><label class="field-label">Execução (s)</label><input class="field-input" type="number" id="progBrainAction" value="40"></div>
            </div>
            <div id="progBrainExList"></div>
          </div>

          <div style="display:flex;gap:8px;margin-top:16px;">
            <button class="admin-btn" id="progSaveBtn">SALVAR PROGRAMA</button>
            <button class="admin-btn" id="progCancelBtn" style="background:var(--surface2);">CANCELAR</button>
          </div>
        </div>

        <div id="adminProgramList"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/admin-nav.js"></script>
  <script type="module" src="assets/js/admin-auth.js"></script>
  <script type="module" src="assets/js/admin-users.js"></script>
  <script type="module" src="assets/js/admin-groups.js"></script>
  <script type="module" src="assets/js/admin-programs.js"></script>
</body>
</html>
